  #   config:
  #     gpio_num: 22
  #     speed_mode: LEDC_LOW_SPEED_MODE
  #     channel: 1
  #     timer_sel: LEDC_TIMER_0
  #     duty: 0
  #     duty_resolution: LEDC_TIMER_10_BIT
  #     freq_hz: 5000

    # LCD SPI Configuration for ST77916 QSPI
  - name: spi_display
    type: spi
    role: master
    config:
      # spi_bus_config_t fields
      spi_bus_config:
        spi_port: SPI2_HOST              # 0: SPI1_HOST, 1: SPI2_HOST, 2: SPI3_HOST
        mosi_io_num: 37                   # MOSI_IO_NUM
        sclk_io_num: 36                   # SPI Clock signal
        max_transfer_sz: 110080            # Maximum transfer size in bytes : width * height * 2 

