board: mpython_v3
chip: esp32s3
version: 1.0.0
# Peripherals Configuration for ESP32-S3-KORVO2-V3
peripherals:
  # I2C Configuration
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 44
        scl: 43

  # I2S Audio Configuration
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out                     # tdm-out, tdm-in
    config: &i2s_config
      port: 0
      # Clock configuration
      sample_rate_hz: 16000             # Sample rate in Hz
      mclk_multiple: 256                # Multiple of MCLK to sample rate (256 or 384 for 24-bit)
      # Slot configuration
      data_bit_width: 16                # Data bit width (valid data bits per sample)
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO  # Total bits per slot (I2S_SLOT_BIT_WIDTH_AUTO or specific value)
      slot_mode: I2S_SLOT_MODE_STEREO     # I2S_SLOT_MODE_MONO or I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH          # I2S_TDM_SLOT0, I2S_TDM_SLOT1 slots
      ws_width: 16                      # WS signal width in BCLK ticks
      total_slot: 2

      # GPIO configuration
      pins:
        mclk: 39                       # GPIO number for MCLK
        bclk: 41                        # GPIO number for BCLK
        ws: 42                         # GPIO number for WS
        dout: 38                        # GPIO number for DATA out
        din: 40                        # GPIO number for DATA in

  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config:config: *i2s_config


  # Backlight Control
  # - name: ledc_backlight
